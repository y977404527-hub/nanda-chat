<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>沐辰 - 聊聊吧</title>
  <style>
    :root {
      --bg: #fdf8f5;
      --bg2: #fff9f6;
      --bg3: #f5ede8;
      --border: #e8d8d0;
      --accent: #c9748a;
      --accent2: #b05c72;
      --accent-glow: rgba(201, 116, 138, 0.15);
      --text: #3a2a2e;
      --text-sub: #9e8085;
      --user-bubble: #fde8ec;
      --ai-bubble: #fff9f6;
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23e8c8d0' fill-opacity='0.18'%3E%3Ccircle cx='20' cy='20' r='1'/%3E%3C/g%3E%3C/svg%3E");
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      background: rgba(255,249,246,0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid rgba(201,116,138,0.5);
      box-shadow: 0 2px 10px rgba(201,116,138,0.25);
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    .header-info h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #3a2a2e;
    }
    .header-info .status {
      font-size: 12px;
      color: #c98090;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 2px;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e8748a;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .header-badge {
      margin-left: auto;
      background: linear-gradient(135deg, #fde8ec, #f5d5df);
      border: 1px solid rgba(201,116,138,0.3);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 11px;
      color: #b05c72;
      font-weight: 500;
    }

    /* Messages area */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: #e8c8d0; border-radius: 2px; }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 28px 20px;
      color: var(--text-sub);
    }
    .welcome .avatar-big {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 14px;
      border: 3px solid rgba(201,116,138,0.3);
      box-shadow: 0 4px 24px rgba(201,116,138,0.2);
    }
    .welcome .avatar-big img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    .welcome h2 { font-size: 18px; color: var(--text); margin-bottom: 8px; font-weight: 600; }
    .welcome p { font-size: 14px; line-height: 1.6; color: var(--text-sub); }

    .quick-prompts {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 16px;
    }
    .quick-prompt {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
    }
    .quick-prompt:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-glow);
    }

    /* Message row */
    .msg-row {
      display: flex;
      gap: 10px;
      max-width: 780px;
      width: 100%;
      align-self: flex-start;
    }
    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-top: 2px;
    }
    .msg-row.ai .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      border: 1.5px solid rgba(201,116,138,0.3);
      margin-top: 2px;
      background: none;
    }
    .msg-row.ai .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }
    .msg-row.user .msg-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
      background: linear-gradient(135deg, #f4a0b0, #e8748a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 15px;
      line-height: 1.65;
      max-width: calc(100% - 50px);
      word-break: break-word;
    }
    .msg-row.ai .bubble {
      background: #fff9f6;
      border: 1px solid #f0dde5;
      border-top-left-radius: 4px;
      color: var(--text);
      box-shadow: 0 1px 6px rgba(201,116,138,0.06);
    }
    .msg-row.user .bubble {
      background: linear-gradient(135deg, #fce8ed, #f9d5df);
      border: 1px solid rgba(201,116,138,0.22);
      border-top-right-radius: 4px;
      color: var(--text);
    }

    /* Typing indicator - 横排 */
    .typing {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
    }
    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: dotPulse 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 60%, 100% { transform: scale(0.7); opacity: 0.4; }
      30% { transform: scale(1.1); opacity: 1; }
    }
    .think-text {
      color: var(--text-sub);
      font-size: 13px;
      letter-spacing: 0.05em;
      animation: fadeInOut 1.6s ease-in-out infinite;
      margin-left: 2px;
    }
    /* 思考时横向扫描线 */
    .think-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
    }
    .think-bar-track {
      width: 80px;
      height: 3px;
      background: #f0dde5;
      border-radius: 2px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .think-bar-fill {
      width: 40%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      border-radius: 2px;
      animation: scanBar 1.4s ease-in-out infinite;
    }
    @keyframes scanBar {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    @keyframes fadeInOut {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Input area */
    .input-wrap {
      background: rgba(255,249,246,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 10px 16px 14px;
      flex-shrink: 0;
    }
    /* 回复建议条 */
    .suggest-row {
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding-bottom: 10px;
      max-width: 780px;
      margin: 0 auto;
      scrollbar-width: none;
    }
    .suggest-row::-webkit-scrollbar { display: none; }
    .suggest-chip {
      flex-shrink: 0;
      background: #fff9f6;
      border: 1.5px solid #f0dde5;
      border-radius: 18px;
      padding: 6px 14px;
      font-size: 13px;
      color: #7a5060;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
      animation: chipIn 0.25s ease;
    }
    @keyframes chipIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .suggest-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(201,116,138,0.06);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      max-width: 780px;
      margin: 0 auto;
    }
    textarea {
      flex: 1;
      background: #fff9f6;
      border: 1.5px solid #e8d8d0;
      border-radius: 22px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 10px 16px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 44px;
      line-height: 1.5;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(201,116,138,0.12);
    }
    textarea::placeholder { color: #c4a0a8; }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8748a, #c9748a);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(201,116,138,0.35);
    }
    .send-btn:hover { background: linear-gradient(135deg, #d4607a, #b85570); transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-sub);
      margin-top: 8px;
    }

    /* 趣味入口卡片 */
    .fun-section {
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
    }
    .fun-section-title {
      font-size: 11px;
      color: var(--text-sub);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
      padding-left: 2px;
    }
    .fun-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .fun-card {
      background: #fff9f6;
      border: 1.5px solid #f0dde5;
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.22s;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .fun-card:hover {
      border-color: var(--accent);
      background: rgba(201,116,138,0.06);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(201,116,138,0.15);
    }
    .fun-card:active { transform: scale(0.97); }
    .fun-card-icon { font-size: 22px; margin-bottom: 6px; }
    .fun-card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }
    .fun-card-desc {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.4;
    }
    .fun-card.accent {
      border-color: rgba(201,116,138,0.4);
      background: rgba(201,116,138,0.05);
    }

    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 6px;
    }
    .quick-tag {
      background: #fff9f6;
      border: 1.5px solid #f0dde5;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      color: #7a5060;
      cursor: pointer;
      transition: all 0.18s;
    }
    .quick-tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(201,116,138,0.06);
    }

    /* Scrollbar */
    @media (max-width: 600px) {
      .header { padding: 12px 14px; }
      .messages { padding: 14px 10px; }
      .input-wrap { padding: 10px; }
      .bubble { font-size: 14px; }
      .fun-cards { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .fun-card { padding: 12px 13px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="avatar">
    <img src="/avatar.jpg" alt="沐辰" onerror="this.parentElement.innerHTML='🌙'" />
  </div>
  <div class="header-info">
    <h1>沐辰</h1>
    <div class="status">
      <div class="status-dot"></div>
      在线 · 随时陪你聊
    </div>
  </div>
  <div class="header-badge">✦ 温柔男大</div>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="avatar-big">
      <img src="/avatar.jpg" alt="沐辰" onerror="this.style.display='none'" />
    </div>
    <h2>嗨，我是沐辰，很高兴认识你</h2>
    <p>有什么开心或不开心的，都可以跟我说<br/>我会认真听的</p>

    <div class="fun-section">
      <!-- 趣味游戏卡片 -->
      <div class="fun-section-title">✨ 想玩点什么</div>
      <div class="fun-cards">
        <div class="fun-card accent" onclick="playGame('riddle')">
          <div class="fun-card-icon">🎭</div>
          <div class="fun-card-title">猜谜语</div>
          <div class="fun-card-desc">我出一个，看你几秒能猜中</div>
        </div>
        <div class="fun-card" onclick="playGame('tarot')">
          <div class="fun-card-icon">🔮</div>
          <div class="fun-card-title">今日塔罗</div>
          <div class="fun-card-desc">抽一张牌，看看今天的运势</div>
        </div>
        <div class="fun-card" onclick="playGame('wouldyou')">
          <div class="fun-card-icon">💭</div>
          <div class="fun-card-title">二选一</div>
          <div class="fun-card-desc">很难选的那种，你来试试</div>
        </div>
        <div class="fun-card" onclick="playGame('personality')">
          <div class="fun-card-icon">🌸</div>
          <div class="fun-card-title">性格测试</div>
          <div class="fun-card-desc">几个问题，说说你是哪种人</div>
        </div>
      </div>

      <!-- 聊天话题标签 -->
      <div class="fun-section-title">💬 随便聊聊</div>
      <div class="quick-tags">
        <div class="quick-tag" onclick="sendQuick(this)">今天心情不太好</div>
        <div class="quick-tag" onclick="sendQuick(this)">我最近喜欢上一个人</div>
        <div class="quick-tag" onclick="sendQuick(this)">推荐一部好看的电影</div>
        <div class="quick-tag" onclick="sendQuick(this)">我不知道自己想要什么</div>
        <div class="quick-tag" onclick="sendQuick(this)">你觉得我是什么性格</div>
        <div class="quick-tag" onclick="sendQuick(this)">陪我发会儿呆</div>
        <div class="quick-tag" onclick="sendQuick(this)">讲个故事给我听</div>
        <div class="quick-tag" onclick="sendQuick(this)">问我一个有趣的问题</div>
      </div>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div class="suggest-row" id="suggestRow"></div>
  <div class="input-row">
    <textarea
      id="input"
      placeholder="跟沐辰说说..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let welcomeEl = document.getElementById('welcome');

  let history = [];
  let isStreaming = false;

  function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendQuick(el) {
    inputEl.value = el.textContent;
    sendMessage();
  }

  // 趣味游戏入口
  const gamePrompts = {
    riddle: '来，给我出一个谜语，要那种听起来很简单但其实要想一下的，我来猜。',
    tarot: '帮我抽一张今日塔罗牌，用你的方式解读一下，我想知道今天的状态。',
    wouldyou: '给我来一道"二选一"，要那种很难抉择的、会暴露性格的题目，我来选。',
    personality: '想做个性格小测试，你来问我问题，根据我的回答判断我是什么性格，开始吧。',
  };

  function playGame(type) {
    inputEl.value = gamePrompts[type] || '';
    sendMessage();
  }

  const suggestRow = document.getElementById('suggestRow');

  function showSuggestions(chips) {
    suggestRow.innerHTML = '';
    if (!chips || chips.length === 0) return;
    chips.forEach(text => {
      const chip = document.createElement('div');
      chip.className = 'suggest-chip';
      chip.textContent = text;
      chip.onclick = () => {
        inputEl.value = text;
        suggestRow.innerHTML = '';
        sendMessage();
      };
      suggestRow.appendChild(chip);
    });
  }

  async function fetchSuggestions(messages) {
    try {
      const resp = await fetch('/api/suggest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages }),
      });
      const data = await resp.json();
      showSuggestions(data.suggestions || []);
    } catch {}
  }
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' });
  }

  const AVATAR_URL = '/avatar.jpg';

  function makeAiAvatar() {
    const div = document.createElement('div');
    div.className = 'msg-avatar';
    const img = document.createElement('img');
    img.src = AVATAR_URL;
    img.alt = '沐辰';
    img.onerror = () => { div.textContent = '🌙'; };
    div.appendChild(img);
    return div;
  }

  function addMessage(role, text) {
    if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }

    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    let avatar;
    if (role === 'ai') {
      avatar = makeAiAvatar();
    } else {
      avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '🙋';
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function addTyping(phase) {
    if (welcomeEl) { welcomeEl.remove(); welcomeEl = null; }
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'typing-row';

    const avatar = makeAiAvatar();

    const bubble = document.createElement('div');

    if (phase === 'thinking') {
      // 横向扫描条 + 文字
      bubble.className = 'bubble think-bar';
      bubble.innerHTML = '<div class="think-bar-track"><div class="think-bar-fill"></div></div><span class="think-text">沐辰在想…</span>';
    } else {
      // 三个点横排
      bubble.className = 'bubble typing';
      bubble.innerHTML = '<span></span><span></span><span></span>';
    }

    row.appendChild(avatar);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    scrollToBottom();
    return row;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    suggestRow.innerHTML = ''; // 发送时清空建议

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    // 阶段一：沐辰在想… (1.2~2.2秒)
    const thinkingRow = addTyping('thinking');
    await sleep(1200 + Math.random() * 1000);
    thinkingRow.remove();

    // 阶段二：打字动效 + 同时请求
    const typingRow = addTyping('typing');

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      if (!response.ok) throw new Error('请求失败');

      typingRow.remove();
      const bubble = addMessage('ai', '');
      let aiText = '';
      let charQueue = [];
      let rendering = false;

      // 逐字打字机效果，每字 20~50ms
      async function renderQueue() {
        if (rendering) return;
        rendering = true;
        while (charQueue.length > 0) {
          const ch = charQueue.shift();
          aiText += ch;
          bubble.textContent = aiText;
          scrollToBottom();
          // 标点符号停顿更久，模拟真实停顿感
          const isPunct = '，。！？…、'.includes(ch);
          await sleep(isPunct ? 80 + Math.random() * 120 : 20 + Math.random() * 30);
        }
        rendering = false;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const raw = line.slice(6).trim();
          if (raw === '[DONE]') break;
          try {
            const parsed = JSON.parse(raw);
            if (parsed.error) { bubble.textContent = parsed.error; break; }
            if (parsed.content) {
              for (const ch of parsed.content) charQueue.push(ch);
              renderQueue();
            }
          } catch {}
        }
      }

      // 等待渲染队列清空
      while (charQueue.length > 0 || rendering) await sleep(50);

      if (aiText) {
        history.push({ role: 'assistant', content: aiText });
        // 异步获取回复建议（不阻塞主流程）
        fetchSuggestions(history);
      }

    } catch (err) {
      typingRow.remove();
      addMessage('ai', '好像网络有点问题，稍等一下再试试？');
      console.error(err);
    }

    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
